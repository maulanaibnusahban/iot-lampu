<!doctype html>
<html>
  <head>
    <title>Relay Control</title>
  </head>
  <body>
    <button onclick="relayOn()">ON</button>
    <button onclick="relayOff()">OFF</button>

    <script>
      const socket = new WebSocket("ws://192.168.1.7:3000");

      socket.onopen = () => {
        socket.send(
          JSON.stringify({
            type: "web",
          }),
        );
      };

      function relayOn() {
        socket.send(
          JSON.stringify({
            type: "web",
            command: "ON",
          }),
        );
      }

      function relayOff() {
        socket.send(
          JSON.stringify({
            type: "web",
            command: "OFF",
          }),
        );
      }
    </script>
  </body>
</html>
